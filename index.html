<!DOCTYPE html>
<html>
<head>
    <title>Smart Survey Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>📊 Smart Survey Dashboard</h1>

    <div class="dashboard">

        <!-- LEFT: FORM -->
        <div class="card">
            <h2>Select Survey</h2>
            <select id="templateSelect">
                <option value="teacher">Teacher Feedback</option>
                <option value="event">Event Feedback</option>
            </select>

            <form id="surveyForm">
                <h3>Questions</h3>
                <div id="questionsContainer"></div>
                <button type="submit">Submit</button>
            </form>
        </div>

        <!-- RIGHT: CHARTS -->
        <div class="card">
            <h2>Charts</h2>
            <canvas id="barChart"></canvas>
            <canvas id="pieChart"></canvas>
        </div>

        <!-- ANALYTICS -->
        <div class="card">
            <h2>Analytics</h2>
            <p>Total Responses: <span id="total"></span></p>
            <p>Average Rating: <span id="average"></span></p>
            <p>Top Feedback: <span id="top"></span></p>

            <button onclick="resetData()">Reset</button>
            <button onclick="exportCSV()">Export CSV</button>
            <button onclick="toggleDarkMode()">🌙 Dark Mode</button>
        </div>

        <!-- HISTORY -->
        <div class="card full-width">
            <h2>Response History</h2>
            <table id="historyTable">
                <thead>
                    <tr>
                        <th>Responses</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="script.js"></script>

</body>
</html>
